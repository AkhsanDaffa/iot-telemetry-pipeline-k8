apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-iot-service
  labels:
    app: iot-sensor
    release: monitoring
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    app: iot-sensor
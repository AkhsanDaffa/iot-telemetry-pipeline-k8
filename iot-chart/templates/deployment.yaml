apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-sensor-deployment
  labels:
    app: iot-sensor
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: iot-sensor
  template:
    metadata:
      labels:
        app: iot-sensor
    spec:
      containers:
      - name: dummy-sensor
        #image: akhsan/iot-dummy:v2
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: Always
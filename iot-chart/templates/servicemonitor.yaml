apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-iot-monitor
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: iot-sensor
      app.kubernetes.io/instance: {{ .Release.Name }}

  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s